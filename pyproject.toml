[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "amazon-spending"
version = "0.1.0"
description = "Local-first Amazon order history collector and viewer"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
  "playwright>=1.50.0",
  "streamlit>=1.40.0",
  "fastapi>=0.115.0",
  "uvicorn>=0.30.0",
]

[project.scripts]
amazon-spending = "amazon_spending.cli:main"

[tool.setuptools]
packages = ["amazon_spending"]
include-package-data = true

[tool.setuptools.package-data]
amazon_spending = ["sql/*.sql"]
