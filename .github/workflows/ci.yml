name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend – lint, test & scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check amazon_spending tests

      - name: Type check (mypy)
        run: mypy amazon_spending

      - name: Run tests (pytest)
        run: python -m pytest

      - name: Security scan (bandit)
        # B608 flags parameterized SQL and PRAGMA statements as injection risks (false positives)
        run: bandit -r amazon_spending -ll -q --skip B608

  frontend:
    name: Frontend – build, lint & scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check & build
        run: npm run build

      - name: Lint (ESLint)
        run: npm run lint

      - name: Security scan (npm audit)
        run: npm audit --audit-level=high
